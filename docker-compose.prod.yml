services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kwiklist
      POSTGRES_PASSWORD: kwikpassword
      POSTGRES_DB: kwiklist_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/kwiklist_db
      - SPRING_DATASOURCE_USERNAME=kwiklist
      - SPRING_DATASOURCE_PASSWORD=kwikpassword
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
